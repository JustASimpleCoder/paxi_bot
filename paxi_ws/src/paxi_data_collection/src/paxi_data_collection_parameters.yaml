paxi_data_collection:
  stamp_current_date: {
    type: bool,
    default_value: true,
    read_only: true,
    description: "Adds the current date to the end of bag file name (using systems local time)"
  }

  bag_name: {
    type: string,
    default_value: "sensors_bag",
    read_only: true,
    description: "Name of the bag (folder & database name) that gets written"
  }

  topic_names: {
    type: string_array,
    default_value: ["scan", "paxi/imu_raw","imu/data", "joint_states"],
    read_only: true,
    description: "List of topic names that you want to write to bag (must match index of ``topic_msg`` types)",
  }



